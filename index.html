<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content" />
    <!-- A böngésző saját sávjának (URL-sáv / státuszsáv) színe: így nem az
         oldal tartalma látszik át alatta, hanem a téma sötét háttere. -->
    <meta name="theme-color" content="#1A1510" />
    <title>Hajdu Tamás — Fotós & Videós | Budapest</title>
    <meta
      name="description"
      content="Budapesti fotós és videós. Rendezvények, underground bulik, portrék, videóklippek. Arzenál és hasonló helyszínek."
    />
    <meta
      name="keywords"
      content="fotós budapest, rendezvény fotós, buli fotós, rave fotós, budapest videós, budapest fotós, videós budapest, portré fotózás, urbex fotó, profi fotós, profi videós, profi operatőr, budapesti fotós, budapest based photographer, budapest based videographer"
    />
    <meta name="author" content="Hajdu Tamás" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, Discord, WhatsApp előnézet) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hajdu Tamás Fotós & Videós" />
    <meta property="og:title" content="Hajdu Tamás – Fotós & Videós | Budapest" />
    <meta
      property="og:description"
      content="Rendezvények, underground bulik, portrék és videóklippek Budapestről."
    />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/dpeavk0xh/image/upload/w_1200,h_630,c_fill,f_auto,q_auto/WebAppHajduTamas/portfolio/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://hajdutamas.hu" />
    <meta property="og:locale" content="hu_HU" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter/X kártya -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hajdu Tamás Fotós & Videós" />
    <meta
      name="twitter:description"
      content="Rendezvények, underground bulik, portrék és videóklippek."
    />
    <meta
      name="twitter:image"
      content="https://res.cloudinary.com/dpeavk0xh/image/upload/w_1200,h_630,c_fill,f_auto,q_auto/WebAppHajduTamas/portfolio/og-image.jpg"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://hajdutamas.hu" />

    <!-- Font preconnect – legkorábbi kapcsolat a Google Fonts szerverrel -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Kritikus fontok preload – böngésző letölti mielőtt bármit renderelne.
         display=block: nem mutat fallbacket, megvárja a fontot.
         Ez eliminálja a FOUT villanást az első látogatásnál is. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:ital,wght@0,300;0,700;0,900;1,300&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=block"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:ital,wght@0,300;0,700;0,900;1,300&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=block" />
    </noscript>

    <!-- Fallback font definíció – amíg a Google Font betölt, rendszer-font mutatja
         de ugyanolyan karakterszélességgel, így nem ugrik el a szöveg -->
    <style>
      /* Kritikus CSS – font-face fallback hogy ne villogjon az elrendezés */
      @font-face {
        font-family: 'Bebas Neue';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: local('Impact'), local('Arial Narrow');
        size-adjust: 92%;
      }
    </style>

    <!-- Strukturált adat (JSON-LD) – helyi szolgáltatás Google számára -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Hajdu Tamás Fotós & Videós",
      "image": "https://res.cloudinary.com/dpeavk0xh/image/upload/w_1200,h_630,c_fill,f_auto,q_auto/WebAppHajduTamas/portfolio/og-image.jpg",
      "url": "https://hajdutamas.hu",
      "description": "Budapesti fotós és videós. Rendezvények, underground bulik, portrék, videóklippek.",
      "areaServed": {
        "@type": "City",
        "name": "Budapest"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Budapest",
        "addressCountry": "HU"
      },
      "priceRange": "$$",
      "serviceType": ["Rendezvényfotózás", "Portréfotózás", "Videóklip forgatás", "Urbex fotózás"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
